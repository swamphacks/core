apiVersion: 1

groups:
  - name: core-api-alerts
    folder: Services
    interval: 1m

    rules:
      - uid: core_api_errors
        title: Core API errors detected
        condition: C

        data:
          - refId: A
            queryType: range
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki_uid
            model:
              queryType: range
              expr: count_over_time({container_name=~"core-api.*"} | json | level="error" [5m])
              refId: A
          - refId: reducer
            queryType: expression
            datasourceUid: __expr__
            model:
              conditions:
                  - evaluator:
                      params:
                          - 0
                          - 0
                      type: gt
                    operator:
                      type: and
                    query:
                      params: []
                    reducer:
                      params: []
                      type: avg
                    type: query
              datasource:
                  name: Expression
                  type: __expr__
                  uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: reducer
              type: reduce
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                  - evaluator:
                      params:
                          - 0
                      type: gt
                    operator:
                      type: and
                    query:
                      params: []
                    reducer:
                      params: []
                      type: last
                    type: query
              datasource:
                  type: __expr__
                  uid: __expr__
              expression: reducer
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold

        for: 1m

        noDataState: NoData
        execErrState: Error

        labels:
          severity: warning
          scope: global
          alertname: core_api_errors

        notification_settings:
          receiver: discord