services:
  # Caddy

  caddy:
    image: ghcr.io/caddybuilds/caddy-cloudflare:latest
    container_name: caddy
    env_file:
      - ./secrets/.env.cf # This needs to be pulled first since Caddy needs to compelte DNS challenge!
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.api:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api-dev
      - api
  # ========================
  # Development Services
  # ========================
  api-dev:
    image: ghcr.io/swamphacks/core-api:dev
    ports:
      - "8081:8080"
    restart: always
    env_file:
      - ./secrets/.env.dev.api
    depends_on:
      - redis-dev

  email-worker-dev:
    image: ghcr.io/swamphacks/core-email-worker:dev
    restart: always
    env_file:
      - ./secrets/.env.dev.api
    depends_on:
      - redis-dev

  bat-worker-dev:
    image: ghcr.io/swamphacks/core-bat-worker:dev
    restart: always
    env_file:
      - ./secrets/.env.dev.api
    depends_on:
      - redis-dev

  redis-dev:
    image: redis:8.2.1-alpine
    container_name: redis-dev
    restart: always
    command: >
      redis-server
      --maxmemory 200mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - redis_data_dev:/data
    deploy:
      resources:
        limits:
          memory: 200M
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  asynqmon-dev:
    image: hibiken/asynqmon:latest
    platform: linux/amd64
    ports:
      - "6768:6767"
    environment:
      - REDIS_ADDR=redis-dev:6379
      - PORT=6767
    depends_on:
      - redis-dev

  # ========================
  # Production Services
  # ========================
  api:
    image: ghcr.io/swamphacks/core-api:latest
    ports:
      - "8080:8080"
    restart: always
    env_file:
      - ./secrets/.env.api
    depends_on:
      - redis
  
  email-worker:
    image: ghcr.io/swamphacks/core-email-worker:latest
    restart: always
    env_file:
      - ./secrets/.env.api
    depends_on:
      - redis

  bat-worker:
    image: ghcr.io/swamphacks/core-bat-worker:latest
    restart: always
    env_file:
      - ./secrets/.env.api
    depends_on:
      - redis

  redis:
    image: redis:8.2.1-alpine
    container_name: redis
    restart: always
    command: >
      redis-server
      --maxmemory 500mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 500M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  asynqmon:
    image: hibiken/asynqmon:latest
    platform: linux/amd64
    ports:
      - "6767:6767"
    environment:
      - REDIS_ADDR=redis:6379
      - PORT=6767
    depends_on:
      - redis

  # ========================
  # Monitoring
  # ========================
  loki:
    image: grafana/loki:3.7.1
    container_name: loki
    command: "-config.file=/etc/loki/config.yml"
    volumes:
      - ../monitoring/loki-config.yml:/etc/loki/config.yml

  alloy:
    image: grafana/alloy:v1.15.0
    container_name: alloy
    command: run /etc/alloy/config.alloy
    volumes:
      - ../monitoring/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:12.4.2
    container_name: grafana
    env_file:
      - ./secrets/.env.api
    environment:
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_AUTH_PROXY_ENABLED=true
      - GF_AUTH_PROXY_HEADER_NAME=X-WEBAUTH-USER
      - GF_USERS_AUTO_ASSIGN_ORG_ROLE=Admin
      - GF_SERVER_ROOT_URL=https://grafana.swamphacks.com/
    volumes:
      - ../monitoring/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - alloy
      - api

  grafana-dev:
    image: grafana/grafana:12.4.2
    container_name: grafana-dev
    env_file:
      - ./secrets/.env.dev.api
    environment:
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_AUTH_PROXY_ENABLED=true
      - GF_AUTH_PROXY_HEADER_NAME=X-WEBAUTH-USER
      - GF_USERS_AUTO_ASSIGN_ORG_ROLE=Admin
      - GF_SERVER_ROOT_URL=https://dev-grafana.swamphacks.com/
    volumes:
      - ../monitoring/provisioning-dev:/etc/grafana/provisioning
      - grafana_data_dev:/var/lib/grafana
    depends_on:
      - alloy
      - api-dev


volumes:
  redis_data:
  redis_data_dev:
  caddy_data:
  caddy_config:
  grafana_data:
  grafana_data_dev:
